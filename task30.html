<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Javascript</title>
</head>
<body>

<script type="text/javascript">
    var fruits = [];
    var nama_buah;

    for (nama_buah = prompt('Masukkan nama buah (ketik stop untuk berhenti) : '); nama_buah != 'stop'; nama_buah = prompt('Masukkan nama buah (ketik stop untuk berhenti) : ')) {
        fruits.push(nama_buah);
    }
    console.log(fruits);
</script>

</body>
</html>
