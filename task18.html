<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Javascript</title>
</head>
<body>

<script type="text/javascript">
    var x;
    var y;
    x = 0;
    y = prompt('Masukkan angka (ketik -1 untuk berhenti) : ');
    while (y != -1) {
        x += Number(y);
        y = prompt('Masukkan angka (ketik -1 untuk berhenti) : ');
    }
    console.log('Total hasil penjumlahan adalah ' + x);
</script>

</body>
</html>
