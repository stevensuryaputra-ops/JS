<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Javascript Random Quotes</title>
</head>
<body><br/>

<button onclick="acakKutipan()" style="padding: 10px 20px; cursor: pointer; background-color: #eee; border: 1px solid #ccc;">Tampilkan Kutipan Acak</button>

<p><b>Kutipan Hari Ini:</b></p>
<p id="tampilKutipan" style="font-style: italic; font-size: 18px;">(Klik tombol di atas untuk melihat kutipan!)</p>

<script type="text/javascript">
    var quotes = [
        "It’s not a bug. It’s an undocumented feature.",
        "Code is like humor. When you have to explain it, it’s bad.",
        "Programmer: A machine that turns coffee into code.",
        "In order to understand recursion, one must first understand recursion.",
        "There are only 10 types of people in the world: those who understand binary, and those who don't.",
        "First, solve the problem. Then, write the code.",
        "A user interface is like a joke. If you have to explain it, it’s not that good.",
        "The best thing about a boolean is even if you are wrong, you are only off by a bit.",
        "Any fool can write code that a computer can understand. Good programmers write code that humans can understand.",
        "Programming is like writing a book... except if you miss a single comma on page 126 the whole thing makes no sense."
    ];

    function acakKutipan() {
        var randomIndex = Math.floor(Math.random() * quotes.length);
        document.getElementById("tampilKutipan").innerHTML = '"' + quotes[randomIndex] + '"';
    }
</script>

</body>
</html>
