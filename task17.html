<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Javascript</title>
</head>
<body>

<script type="text/javascript">
    var x;
    var y;
    var z;

    x = 0;
    y = 0;

    while (x < 10) {
        z = prompt('Masukkan angka ke-' + (x + 1) + ' : ');
        y += Number(z); 
        x += 1;
    }

    console.log('Total hasil penjumlahan adalah ' + y);
</script>

</body>
</html>
