<!DOCTYPE html>
<html>
<head>
    <title>Captcha Sederhana</title>
</head>
<body>

    <h3>Form Login</h3>
    Username: <input type="text"><br><br>
    Password: <input type="password"><br><br>
    <p>Hitung ini dulu:</p>
    <img id="gambar1" src="" width="40">
    <b id="operator" style="font-size: 20px; margin: 0 10px;">+</b>
    <img id="gambar2" src="" width="40">
    <input type="number" id="jawaban" style="width: 50px;">
    <br><br>
    <button onclick="cekCaptcha()">Login</button>
    <p id="pesan"></p>
<script type="text/javascript">
    var gambarAngka = [
        "https://placehold.co/40x40/eeeeee/333333?text=0",
        "https://placehold.co/40x40/eeeeee/333333?text=1",
        "https://placehold.co/40x40/eeeeee/333333?text=2",
        "https://placehold.co/40x40/eeeeee/333333?text=3",
        "https://placehold.co/40x40/eeeeee/333333?text=4",
        "https://placehold.co/40x40/eeeeee/333333?text=5",
        "https://placehold.co/40x40/eeeeee/333333?text=6",
        "https://placehold.co/40x40/eeeeee/333333?text=7",
        "https://placehold.co/40x40/eeeeee/333333?text=8",
        "https://placehold.co/40x40/eeeeee/333333?text=9"
    ];
    var jawabanAsli = 0;
    function buatSoal() {
        var angka1 = Math.floor(Math.random() * 10);
        var angka2 = Math.floor(Math.random() * 10);
        var op = Math.random() < 0.5 ? '+' : '-';
        document.getElementById("gambar1").src = gambarAngka[angka1];
        document.getElementById("gambar2").src = gambarAngka[angka2];
        document.getElementById("operator").innerHTML = op;
        if (op == '+') {
            jawabanAsli = angka1 + angka2;
        } else {
            jawabanAsli = angka1 - angka2;
        }
    }
    function cekCaptcha() {
        var tebakan = document.getElementById("jawaban").value;
        if (tebakan == jawabanAsli && tebakan !== "") {
            document.getElementById("pesan").innerHTML = "CAPTCHA is VALID!";
        } else {
            document.getElementById("pesan").innerHTML = "CAPTCHA is INVALID!";
            document.getElementById("jawaban").value = "";
            buatSoal();
        }
    }
    buatSoal();
</script>

</body>
</html>
